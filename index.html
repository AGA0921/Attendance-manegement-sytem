<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Management System</title>
<style>
  
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
body {
  display: flex;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
  flex-direction:column;
  overflow-x:auto;
  width:250%;
  font-family:Arial ,sans-serif;
}

.sidebar {
  width: 250px;
  background: linear-gradient(180deg, #1e3a8a, #2563eb);
  color: #fff;
  display: flex-shrink:0;
  flex-direction: column;
  padding:20px;
  transition: background 0.3s;
}
.sidebar .logo {
  font-size: 2rem;
  font-weight: bold;
  margin-bottom: 35px;
  text-align: center;
  color: #fff;
  letter-spacing: 1px;
}
.sidebar ul {
  list-style: none;
  padding: 0;
}
.sidebar ul li {
  padding: 10px;
  margin-bottom: 5px;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.3s ease;
  font-weight: 500;
}
.sidebar ul li:hover,
.sidebar ul li.active {
  background: rgba(255, 255, 255, 0.15);
  transform: translateX(5px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.main-content {
  flex: 1;
  padding: 20px;
  background: #f4f6fb;
  transition: background 0.3s;
box-sizing:border-box;

}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}
header h1 {
  font-size: 2rem;
  color: #0f172a;
  letter-spacing: 0.5px;
}
header button {
  padding: 8px 16px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 8px rgba(37,99,235,0.3);
  transition: background 0.3s, transform 0.2s;
}
header button:hover {
  background: #1e40af;
  transform: translateY(-2px);
}

.cards {
  display: flex;
  gap: 25px;
  margin-bottom: 35px;
  flex-wrap: wrap;
}
.card {
  flex: 1;
  min-width: 220px;
  background: linear-gradient(135deg, #ffffff, #f1f3f8);
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 12px 25px rgba(0,0,0,0.1);
  text-align: center;
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 18px 30px rgba(0,0,0,0.15);
}
.card h3 {
  font-size: 1.3rem;
  color: #1e3a8a;
  margin-bottom: 12px;
}
.card p {
  font-size: 1.8rem;
  font-weight: 700;
  color: #0f172a;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}
table th, table td {
  padding: 12px 15px;
  text-align: left;
  border-bottom: 1px solid #e2e8f0;
  transition: background 0.3s;
}
table th {
  background: #2563eb;
  color: #fff;
  font-weight: 600;
}
table tr:hover td {
  background: rgba(37,99,235,0.05);
}

.form-group {
  margin: 15px 0;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.form-group input,
.form-group select {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  flex: 1;
  min-width: 150px;
  transition: border 0.3s, box-shadow 0.3s;
}
.form-group input:focus,
.form-group select:focus {
  border-color: #2563eb;
  box-shadow: 0 0 6px rgba(37,99,235,0.3);
  outline: none;
}
.form-group button {
  padding: 12px 18px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: background 0.3s, transform 0.2s;
}
.form-group button:hover {
  background: #1e40af;
  transform: translateY(-2px);
}

.page {
  display: none;
  animation: fadeIn 0.4s ease-in;
}
.page.active {
  display: block;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}


body.dark-mode {
  background: #0f172a;
  color: #e2e8f0;
}
body.dark-mode .main-content {
  background: #1e293b;
}
body.dark-mode .card {

background: #334155;
  color: white;
}
body.dark-mode table th,
body.dark-mode table td {
  border-color: #475569;
}
body.dark-mode input,
body.dark-mode select {
  background: #475569;
  color: white;
  border-color: #64748b;
}
body.dark-mode button {
  background: #2563eb;
}

  .sidebar {
    width: 250%;
    flex-direction: row;
    overflow-x: auto;
    padding: 10px;
  }
  .sidebar ul {
    display: flex;
  }
  .sidebar ul li {
    margin: 0 5px;
  }
  .main-content {
    flex:1;
    overflow-x:auto;
    padding: 20px;
    width:100%;
    box-sizing:border-box;
  }
  .cards {
    flex-direction: column;
  }
}
</style>
</head>
<body>

<div class="sidebar">
  <h2 class="logo">Attendance</h2>
  <nav>
    <ul>
      <li  data-page="dashboard">Dashboard</li>
      <li data-page="students">Students</li>
      <li data-page="attendance">Attendance</li>
      <li data-page="reports">Reports</li>
    </ul>
  </nav>
</div>

<div class="main-content">
  <header>
    <h1 id="page-title">Dashboard</h1>
    <button id="darkModeBtn">Dark Mode</button>
  </header>

  
  <section id="dashboard" class="page active ">
    <div class="cards">
      <div class="card">
        <h3>Total Students</h3>
        <p id="total-students">0</p>
      </div>
      <div class="card">
        <h3>Today's Attendance</h3>
        <p id="today-attendance">0</p>
      </div>
    </div>
  </section>

  
  <section id="students" class="page active">
    <h2>Add Student</h2>
    <div class="form-group">
      <input type="text" id="student-name" placeholder="Name">
      <input type="text" id="student-class" placeholder="Class">
      <button id="addStudentBtn">Add</button>
    </div>
    <table>
      <thead>
        <tr><th>Name</th><th>Class</th><th>Edit</th><th>Delete</th></tr>
      </thead>
      <tbody id="student-table"></tbody>
    </table>
  </section>

  
  <section id="attendance" class="page active">
    <h2>Mark Attendance</h2>
    <div class="form-group"><input type="date" id="attendance-date">
      <select id="attendance-student"></select>
      <select id="attendance-status">
        <option value="Present">Present</option>
        <option value="Absent">Absent</option>
        <option value="Late">Late</option>
      </select>
      <button id="saveAttendanceBtn">Save</button>
    </div>
  </section>

  
  <section id="reports" class="page active">
    <h2>Reports</h2>
    <button id="downloadReportBtn">Download CSV</button>
    <table>
      <thead>
        <tr><th>Date</th><th>Student</th><th>Status</th></tr>
      </thead>
      <tbody id="report-table"></tbody>
    </table>
  </section>
</div>

<script>

const navItems = document.querySelectorAll('.sidebar ul li');
const pages = document.querySelectorAll('.page');
const pageTitle = document.getElementById('page-title');

navItems.forEach(item => {
  item.addEventListener('click', () => {
    navItems.forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    pages.forEach(p => p.classList.remove('active'));
    document.getElementById(item.dataset.page).classList.add('active');
    pageTitle.textContent = item.textContent;
  });
});

const darkModeBtn = document.getElementById('darkModeBtn');
darkModeBtn.addEventListener('click', () => document.body.classList.toggle('dark-mode'));

let students = [];
const studentTable = document.getElementById('student-table');
const studentSelect = document.getElementById('attendance-student');
const totalStudents = document.getElementById('total-students');
const addStudentBtn = document.getElementById('addStudentBtn');

addStudentBtn.addEventListener('click', () => {
  const name = document.getElementById('student-name').value;
  const cls = document.getElementById('student-class').value;
  if(name && cls){
    students.push({name, cls});
    renderStudents();
    document.getElementById('student-name').value='';
    document.getElementById('student-class').value='';
  }
});

function renderStudents(){
  studentTable.innerHTML='';
  studentSelect.innerHTML='';
  students.forEach((s,i)=>{
    const row = document.createElement('tr');
    row.innerHTML = <td>${s.name}</td><td>${s.cls}</td>
      <td><button onclick="editStudent(${i})">Edit</button></td>
      <td><button onclick="deleteStudent(${i})">Delete</button></td>;
    studentTable.appendChild(row);
    studentSelect.innerHTML += <option value="${s.name}">${s.name}</option>;
  });
  totalStudents.textContent = students.length;
  updateTodayAttendance();
}

function editStudent(i){
  const newName = prompt('Edit Name', students[i].name);
  if(newName) students[i].name = newName;
  renderStudents();
}

function deleteStudent(i){
  students.splice(i,1);
  renderStudents();
}

let attendanceRecords = [];
const saveAttendanceBtn = document.getElementById('saveAttendanceBtn');
const reportTable = document.getElementById('report-table');
const todayAttendance = document.getElementById('today-attendance');

saveAttendanceBtn.addEventListener('click', ()=>{
  const date = document.getElementById('attendance-date').value;
  const student = document.getElementById('attendance-student').value;
  const status = document.getElementById('attendance-status').value;
  if(!date || !student) return alert('Please select date and student');
  attendanceRecords.push({date, student, status});
  renderReports();
});

function renderReports(){
  reportTable.innerHTML='';
  attendanceRecords.forEach(a=>{
    const row = document.createElement('tr');
    row.innerHTML = <td>${a.date}</td><td>${a.student}</td><td>${a.status}</td>;
    reportTable.appendChild(row);
  });
  updateTodayAttendance();
}

function updateTodayAttendance(){
  todayAttendance.textContent = attendanceRecords.length;
}
const downloadReportBtn = document.getElementById('downloadReportBtn');
downloadReportBtn.addEventListener('click', ()=>{
  let csv = 'Date,Student,Status\n';
  attendanceRecords.forEach(a=>{
    csv += ${a.date},${a.student},${a.status}\n;
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'attendance_report.csv';
  a.click();
});
</script>
</body>
</html>
