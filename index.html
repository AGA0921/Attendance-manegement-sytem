
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Attendance Management System</title>

<style>

:root{
--bg:#f4f6fb;
--card:#fff;
--text:#111;
--primary:#2563eb;
}

body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#fff;
}

body{
margin:0;
font-family:Arial;
display:flex;
background:var(--bg);
color:var(--text);
flex-direction:row;
min-height:100vh;


}


.sidebar{
width:220px;
background:#1e40af;
color:white;
height:100vh;
padding:20px;
transition:0.3s;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:12px;
margin:8px 0;
cursor:pointer;
border-radius:6px;
}

.sidebar a:hover{
background:#2563eb;
}

.sidebar a.active{
background:#2563eb;
}


.main{
flex:1;
padding:20px;
  width:100%;
  max-width:1200px;
  margin:auto;
  box-sizing:border-box;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
  margin-buttom:25px;
  flex-wrap:wrap;
}


.menu{
display:none;
font-size:22px;
cursor:pointer;
}


.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input,select{
padding:8px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
background:var(--primary);
color:white;
cursor:pointer;
}


table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:var(--card);
  overflow-x:auto;
  display:block;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:var(--primary);
color:white;
}


.section{
display:none;
}

.section.active{
display:block;
}


@media(max-width:768px){

body{
flex-direction:column;
}

.sidebar{
position:fixed;
left:-240px;
display:flex;
height:100%;
gap:10px;
width:100%;
height:auto;
overflow-x:auto;
padding:10px;



  
}

.sidebar.show{
left:0;
}

.menu{
display:block;
}

}

</style>

</head>

<body>

<div class="sidebar" id="sidebar">

<h2>Attendance</h2>

<a class="nav active" onclick="showPage('dashboard',this)">Dashboard</a>
<a class="nav" onclick="showPage('students',this)">Students</a>
<a class="nav" onclick="showPage('attendance',this)">Attendance</a>
<a class="nav" onclick="showPage('reports',this)">Reports</a>

</div>


<div class="main">

<div class="header">

<span class="menu" onclick="toggleMenu()">☰</span>

<h2>Dashboard</h2>

<button onclick="toggleMode()">Dark</button>

</div>



<div id="dashboard" class="section page active ">

<div class="cards">

<div class="card">
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>

<div class="card">
<h3>Today Attendance</h3>
<p id="todayAttendance">0</p>
</div>

</div>

</div>



<div id="students" class="section page active">

<h3>Add Student</h3>

<input id="name" placeholder="Name">
<input id="class" placeholder="Class">

<button onclick="addStudent()">Add</button>

<table>

<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>Edit</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

</div>



<div id="attendance" class="section page active">

<h3>Mark Attendance</h3>

<input type="date" id="date">

<select id="studentSelect"></select>

<select id="status">
<option>Present</option>
<option>Absent</option>
<option>Late</option>
</select>

<button onclick="saveAttendance()">Save</button>

</div>



<div id="reports" class="section">

<h3>Reports</h3>

<button onclick="downloadCSV()">Export Excel</button>

<table>

<thead>
<tr>
<th>Date</th>
<th>Student</th>
<th>Status</th>
</tr>
</thead>

<tbody id="reportTable"></tbody>

</table>

</div>

</div>


<script>



let students = JSON.parse(localStorage.getItem("students")) || []
let attendance = JSON.parse(localStorage.getItem("attendance")) || []


function saveData(){

localStorage.setItem("students",JSON.stringify(students))
localStorage.setItem("attendance",JSON.stringify(attendance))

}


function showPage(page,el){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(page).classList.add("active")

document.querySelectorAll(".nav").forEach(n=>n.classList.remove("active"))
el.classList.add("active")

}


function toggleMode(){
document.body.classList.toggle("dark")
}

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("show")
}


function addStudent(){

let name=document.getElementById("name").value
let cls=document.getElementById("class").value

students.push({name,cls})

saveData()

renderStudents()

}


function renderStudents(){

let table=document.getElementById("studentTable")
let select=document.getElementById("studentSelect")

table.innerHTML=""
select.innerHTML=""

students.forEach((s,i)=>{

table.innerHTML+=
<tr>
<td>${s.name}</td>
<td>${s.cls}</td>
<td><button onclick="editStudent(${i})">Edit</button></td>
<td><button onclick="deleteStudent(${i})">Delete</button></td>
</tr>


select.innerHTML+=<option>${s.name}</option>

})

document.getElementById("totalStudents").innerText=students.length

}


function deleteStudent(i){

students.splice(i,1)

saveData()

renderStudents()

}


function editStudent(i){

let name=prompt("Edit name",students[i].name)
let cls=prompt("Edit class",students[i].cls)

students[i].name=name
students[i].cls=cls

saveData()

renderStudents()

}


function saveAttendance(){

let date=document.getElementById("date").value
let student=document.getElementById("studentSelect").value
let status=document.getElementById("status").value

attendance.push({date,student,status})

saveData()

renderReport()

}


function renderReport(){

let table=document.getElementById("reportTable")

table.innerHTML=""

attendance.forEach(a=>{

table.innerHTML+=
<tr>
<td>${a.date}</td>
<td>${a.student}</td>
<td>${a.status}</td>
</tr>


})

document.getElementById("todayAttendance").innerText=attendance.length

  }

function downloadCSV(){

let csv="Date,Student,Status\n"

attendance.forEach(a=>{
csv+=${a.date},${a.student},${a.status}\n
})

let blob=new Blob([csv])

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="attendance.csv"

link.click()

}


renderStudents()
renderReport()

</script>

</body>
</html>
